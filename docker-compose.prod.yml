services:
  postgres:
    container_name: postgres
    image: postgres:16-alpine
    restart: always
    environment:
      TZ: "${TZ:-America/Caracas}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgresdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "${POSTGRES_EXT_PORT:-5432}:5432"
    networks:
      - appnet
      
  mailpit:
    container_name: mailpit
    image: axllent/mailpit:latest
    restart: always
    environment:
      # SMTP authentication (format: user:password)
      MP_SMTP_AUTH: "${MAILPIT_SMTP_USER:-mailpit}:${MAILPIT_SMTP_PASS:-mailpit}"
      MP_SMTP_AUTH_ACCEPT_ANY: "false"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"  # Allow plaintext auth for local dev
      MP_SMTP_BIND_ADDR: "0.0.0.0:1025"
      # UI configuration
      MP_UI_BIND_ADDR: "0.0.0.0:8025"
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"  # SMTP port
      - "${MAILPIT_UI_PORT:-8025}:8025"    # Web UI port
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8025 >/dev/null 2>&1 || wget --quiet --tries=1 --spider http://localhost:8025"]
      interval: 30s
      timeout: 10s
      retries: 3

  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_DEFAULT_EMAIL}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_DEFAULT_PASSWORD}"
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmindata:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - postgres
    networks:
      - appnet

  redis:
    container_name: redis
    image: redis:7.4.0-alpine
    restart: always
    volumes:
      - redisdata:/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    ports:
      - "${REDIS_EXT_PORT:-6379}:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      platforms:
        - linux/amd64
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    container_name: nestjs_backend
    image: nestjs_backend_prod
    restart: always
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1"]
      interval: 60s
      timeout: 15s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    links:
      - postgres
      - redis
    env_file:
      - .env
    # Database connection can be configured via:
    # Option 1: Direct DATABASE_URL
    #   DATABASE_URL=postgresql://user:password@host:port/database?schema=public
    # Option 2: Individual variables (recommended for production)
    #   DB_USER=user (or POSTGRES_USER)
    #   DB_PASSWORD=password (or POSTGRES_PASSWORD)
    #   DB_HOST=postgres (for local) or RDS endpoint (e.g., onenglish-instance.ct2kmsuger3r.us-east-2.rds.amazonaws.com)
    #   DB_PORT=5432 (default: 5432)
    #   DB_NAME=database (or POSTGRES_DB)
    #   DB_SCHEMA=public (default: public)
    environment:
      # These will be used if DATABASE_URL is not set
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_SCHEMA=${DB_SCHEMA:-public}
    volumes:
      - uploads:/usr/src/app/uploads
    # tmpfs para /tmp: más rápido (RAM), se limpia automáticamente
    # Ideal para archivos temporales de nestjs-form-data y backups
    tmpfs:
      - /usr/src/app/tmp:size=512m,noexec,nosuid
    networks:
      - appnet

  nginxpm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx_proxy_manager
    restart: always
    ports:
      - "80:80"          # HTTP
      - "81:81"          # Admin interface
      - "443:443"        # HTTPS
    volumes:
      - nginxpm-data:/data
      - nginxpm-letsencrypt:/etc/letsencrypt
    networks:
      - appnet

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  postgresdata:
    name: onenglish-postgresdata
    external: false
  pgadmindata:
    name: onenglish-pgadmindata
    external: false
  redisdata:
    name: onenglish-redisdata
    external: false
  uploads:
    name: onenglish-uploads
    external: false
  nginxpm-data:
    name: npm-data
    external: false
  nginxpm-letsencrypt:
    name: npm-letsencrypt
    external: false
  portainer_data:
    name: portainer_data
    external: false
